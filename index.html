<body>
<canvas id="c"></canvas>
<button id="mute" aria-label="Toggle sound" title="Sound on / off (M)">🔊</button>
<script>
"use strict";
(() => {
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W=0, H=0, DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.floor(W*DPR); canvas.height = Math.floor(H*DPR);
  canvas.style.width=W+"px"; canvas.style.height=H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener("resize", resize); resize();

// ===================== CONFIG =====================
const CFG = {
  gravity: 1500, thrust: 3350, maxVy: 800,
  stiffness: 16, maxVx: 1100, apeR: 15,
  sling: 560, wallTH: 26,
  gapBase: 205, gapMin: 118,
  speedBase: 150, spawnBase: 1.5, spawnMin: 0.82,
  zoneSize: 1150, moonAlt: 5200,
};
const ZONE_NAMES = ["TRENCHES","BLUE SKIES","STRATOSPHERE","ORBIT","THE MOON"];
// [top, bottom, bottom-glow]
const ZONE_BG = [
  ["#150b05","#2a1408","#4a2410"], ["#04141f","#062a3e","#0d4363"],
  ["#100722","#1c0e3e","#341a5c"], ["#070414","#0f0a28","#1c1246"],
  ["#080a11","#141726","#33374d"]
];
const DISP = "'Chakra Petch', ui-monospace, monospace";
const MONO = "'JetBrains Mono', ui-monospace, monospace";
const COL = { green:"#00ff9c", red:"#ff2e50", gold:"#ffce3a", blue:"#5ec8ff", text:"#eafff2", dim:"#5a6b78" };

// ===================== AUDIO (procedural) =====================
let AC=null, master=null, muted=(localStorage.getItem("dip_muted")==="1");
function initAudio(){
  if(AC) return;
  try{
    AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value=0.26;
    const comp = AC.createDynamicsCompressor(); comp.threshold.value=-14; comp.ratio.value=8;
    master.connect(comp); comp.connect(AC.destination);
  }catch(e){ AC=null; }
}
function tone(freq,dur,type="sine",gain=0.4,glideTo=null){
  if(!AC||muted) return; const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.value=freq;
  if(glideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,glideTo),AC.currentTime+dur);
  g.gain.value=gain; g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
  o.connect(g); g.connect(master); o.start(); o.stop(AC.currentTime+dur);
}
function noise(dur,gain=0.5,lp=1200){
  if(!AC||muted) return;
  const buf=AC.createBuffer(1,(AC.sampleRate*dur)|0,AC.sampleRate); const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  const s=AC.createBufferSource(); s.buffer=buf;
  const f=AC.createBiquadFilter(); f.type="lowpass"; f.frequency.value=lp;
  const g=AC.createGain(); g.gain.value=gain; g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
  s.connect(f); f.connect(g); g.connect(master); s.start();
}
function sfxCatch(combo){ const s=Math.min(combo,20), b=440*Math.pow(2,s/12);
  tone(b,0.16,"triangle",0.33); tone(b*1.5,0.11,"sine",0.18); tone(170,0.14,"sine",0.22,340); }
function sfxWhoosh(){ noise(0.26,0.14,850); }
function sfxBank(){ tone(523,0.12,"sine",0.3); tone(784,0.18,"sine",0.26); }
function sfxDiamond(){ tone(320,0.32,"sawtooth",0.12,820); }
function sfxDeath(){ noise(0.5,0.5,700); tone(200,0.6,"sawtooth",0.4,52); }
function sfxGod(){ tone(66,0.5,"sine",0.5,40); tone(660,0.3,"sawtooth",0.14,990); }
function sfxWin(){ [523,659,784,1046].forEach((f,i)=>setTimeout?tone(f,0.5,"triangle",0.24):0); tone(523,0.6,"triangle",0.2); tone(659,0.6,"triangle",0.18); tone(784,0.7,"triangle",0.16); }
const PENT=[0,3,5,7,10]; let arpStep=0, arpNext=0;
function music(now,zone,alt){
  if(!AC||muted) return;
  const tempo=0.30-Math.min(0.17,alt/45000);
  if(now<arpNext) return; arpNext=now+tempo;
  const lift=zone*2, semi=PENT[arpStep%PENT.length]+12*(((arpStep/PENT.length)|0)%2)+lift;
  const f=220*Math.pow(2,semi/12);
  tone(f,tempo*0.9,"square",0.055);
  if(zone>=1) tone(f/2,tempo*1.1,"triangle",0.05);
  if(zone>=2) tone(f*2,tempo*0.5,"sawtooth",0.028);
  if(zone>=3 && arpStep%2===0) noise(0.04,0.035,4200);
  arpStep++;
}

// ===================== STATE =====================
const ST={TITLE:0,PLAY:1,DEAD:2,WIN:3}; let state=ST.TITLE;
const ape={x:W/2,y:H*0.6,vx:0,vy:0,tx:W/2,thrust:false,trail:[]};
let walls=[],rings=[],snipers=[],parts=[],prints=[],candlesBg=[],candlesFar=[],pad=null;
let banked=0,unbanked=0,mult=1,combo=0,bestCombo=0,alt=0,zone=0,prevZone=0;
let diamond=false, forfeited=0;
let spawnT=0,sniperT=0,ringCd=0,elapsed=0;
let shake=0,hitstop=0,timeScale=1,flash=0,flashCol="#16e06a",endT=0;
let chart=[],flexHist=[];
let best=+(localStorage.getItem("dip_best")||0), moonRuns=+(localStorage.getItem("dip_moon")||0);
let pat=null, patCounter=0;

function capNow(){ return banked+unbanked; }
function seedBg(){
  candlesBg=[]; candlesFar=[];
  for(let i=0;i<22;i++) candlesBg.push(mkCandle(Math.random()*H, 1));
  for(let i=0;i<16;i++) candlesFar.push(mkCandle(Math.random()*H, 0.5));
}
function mkCandle(y,layer){ const up=Math.random()>0.5;
  return {x:Math.random()*W,y,w:(6+Math.random()*9)*layer+2,h:(20+Math.random()*70)*layer+10,up,sp:(10+Math.random()*22)*layer,a:layer===1?0.5:0.22}; }
function reset(){
  ape.x=W/2; ape.y=H*0.62; ape.vx=0; ape.vy=0; ape.tx=W/2; ape.thrust=false; ape.trail=[];
  walls=[]; rings=[]; snipers=[]; parts=[]; prints=[]; pad=null;
  banked=0; unbanked=0; mult=1; combo=0; bestCombo=0; alt=0; zone=0; prevZone=0; diamond=false; forfeited=0;
  spawnT=0.5; sniperT=3.5; ringCd=6.5; elapsed=0;
  shake=0; hitstop=0; timeScale=1; flash=0; endT=0; chart=[]; flexHist=[];
  pat=null; patCounter=0;
  if(!candlesBg.length) seedBg();
}

// ===================== SPAWNING (authored patterns) =====================
function zoneFor(a){ return Math.min(4,(a/CFG.zoneSize)|0); }
function speedNow(){ return CFG.speedBase + zone*40 + alt*0.004 + (diamond?30:0); }
function gapNow(){ return Math.max(CFG.gapMin, CFG.gapBase - zone*17); }
function spawnGapS(){ return Math.max(CFG.spawnMin, CFG.spawnBase - zone*0.15 - (diamond?0.08:0)); }
function pickPattern(){
  const lists=[["single","single","zigzag"],["single","zigzag","stairs"],
    ["zigzag","stairs","narrow"],["stairs","narrow","drift","zigzag"],["narrow","drift","stairs","zigzag"]];
  const list=lists[Math.min(zone,4)];
  const type=list[(patCounter++)%list.length];
  const counts={single:2,zigzag:4,narrow:3,stairs:4,drift:2};
  pat={type,i:0,n:counts[type]||2};
}
function spawnWall(){
  if(!pat||pat.i>=pat.n) pickPattern();
  const gw=gapNow(), margin=38, span=Math.max(60,W-2*margin-gw);
  let gx, gwF=gw, gapVx=0;
  switch(pat.type){
    case "zigzag": gx=margin+(pat.i%2?span*0.72:span*0.12); break;
    case "stairs": gx=margin+span*(pat.i/(pat.n-1)); break;
    case "narrow": gx=margin+span*(0.3+0.4*Math.random()); gwF=Math.max(CFG.gapMin,gw-pat.i*24); break;
    case "drift":  gx=margin+span*Math.random(); gapVx=(Math.random()<0.5?-1:1)*(55+zone*8); break;
    default: gx=margin+span*Math.random();
  }
  walls.push({y:-CFG.wallTH-4,gapX:gx,gapW:gwF,gapVx,resolved:false,tele:0.42});
  pat.i++; sfxWhoosh();
}
function spawnRing(){ rings.push({x:60+Math.random()*(W-120),y:-34,r:46,resolved:false}); }
function spawnSniper(){ snipers.push({x:ape.x,lock:0.55,fired:false,beam:0,life:0}); }

// ===================== INPUT =====================
let keyL=false, keyR=false;
function startAudio(){ initAudio(); if(AC&&AC.state==="suspended") AC.resume(); }
function press(){                 // begin thrust / start / restart — no pointer coords touched
  startAudio();
  if(state===ST.TITLE){ reset(); state=ST.PLAY; ape.thrust=true; return; }
  if(state===ST.DEAD||state===ST.WIN){ if(endT>0.4){ reset(); state=ST.PLAY; ape.thrust=true; } return; }
  ape.thrust=true;
}
function setTargetFrom(e){ const t=e.touches?e.touches[0]:e; if(t&&typeof t.clientX==="number") ape.tx=t.clientX; }
function down(e){ setTargetFrom(e); press(); }
function move(e){ setTargetFrom(e); }
function up(){ ape.thrust=false; }
canvas.addEventListener("mousedown",down);
canvas.addEventListener("mousemove",move);
window.addEventListener("mouseup",up);
canvas.addEventListener("touchstart",e=>{down(e);e.preventDefault();},{passive:false});
canvas.addEventListener("touchmove",e=>{move(e);e.preventDefault();},{passive:false});
window.addEventListener("touchend",e=>{up();},{passive:false});
window.addEventListener("keydown",e=>{
  if(e.code==="Space"||e.code==="ArrowUp"){ e.preventDefault(); press(); }
  else if(e.code==="ArrowLeft"||e.code==="KeyA") keyL=true;
  else if(e.code==="ArrowRight"||e.code==="KeyD") keyR=true;
  else if(e.code==="KeyM"){ startAudio(); setMuted(!muted); }
  else if(e.code==="KeyC"&&(state===ST.DEAD||state===ST.WIN)) copyFlex();
  else if(e.code==="KeyS"&&(state===ST.DEAD||state===ST.WIN)) savePNG();
});
window.addEventListener("keyup",e=>{
  if(e.code==="Space"||e.code==="ArrowUp") up();
  else if(e.code==="ArrowLeft"||e.code==="KeyA") keyL=false;
  else if(e.code==="ArrowRight"||e.code==="KeyD") keyR=false;
});
// mute button
const muteBtn=document.getElementById("mute");
function setMuted(m){ muted=m; localStorage.setItem("dip_muted",m?"1":"0");
  muteBtn.textContent=m?"🔇":"🔊"; muteBtn.classList.toggle("off",m); }
setMuted(muted);
muteBtn.addEventListener("mousedown",e=>{ e.stopPropagation(); });
muteBtn.addEventListener("click",e=>{ e.stopPropagation(); startAudio(); setMuted(!muted); });
muteBtn.addEventListener("touchstart",e=>{ e.stopPropagation(); e.preventDefault(); startAudio(); setMuted(!muted); },{passive:false});

// ===================== EFFECTS =====================
function burst(x,y,col,n,spd,life){ for(let i=0;i<n;i++){ const a=Math.random()*6.28,s=Math.random()*spd;
  parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,max:life,col,r:1.5+Math.random()*2.6}); } }
function rankFor(c){ if(c<300)return"JEET"; if(c<900)return"PAPER HANDS"; if(c<2200)return"APE";
  if(c<4500)return"DIAMOND HANDS"; if(c<9000)return"CHAD"; return"LEGEND"; }
function doCatch(){
  combo++; bestCombo=Math.max(bestCombo,combo);
  const gain=(14+combo*3)*mult*(diamond?1.5:1);
  unbanked+=gain; alt+=42; mult+=0.12+combo*0.01;
  ape.vy=-CFG.sling*(1+Math.min(combo,20)*0.02);
  shake=Math.min(1,shake+0.34); hitstop=0.045+Math.min(combo,10)*0.006;
  flash=0.32; flashCol="#16e06a";
  burst(ape.x,ape.y,"#ffd23d",10+Math.min(combo,8),260,0.6);
  prints.push({x:ape.x,y:ape.y,h:0,max:38+Math.min(combo,12)*8,life:0.5});
  flexHist.push("🟩"); sfxCatch(combo);
  if(combo===3||combo===6||combo===10||(combo>0&&combo%15===0)){
    flash=0.6; timeScale=0.34; sfxGod(); burst(ape.x,ape.y,"#16e06a",26,380,0.7); flexHist.push("💥");
  }
}
function liquidate(){
  if(state!==ST.PLAY) return;
  forfeited=unbanked; unbanked=0; state=ST.DEAD; endT=0; ape.thrust=false;
  shake=1; flash=0.85; flashCol="#ff2e4d"; timeScale=1;
  burst(ape.x,ape.y,"#ff2e4d",48,440,0.95); flexHist.push("🟥"); sfxDeath();
  if(Math.floor(banked)>best){ best=Math.floor(banked); localStorage.setItem("dip_best",best); }
}
function bankIt(){
  if(unbanked<=0){ diamond=false; return; }
  banked+=unbanked; unbanked=0; combo=0; mult=Math.max(1,mult*0.6); diamond=false;
  flash=0.3; flashCol="#ffd23d"; burst(ape.x,ape.y,"#ffd23d",22,240,0.6);
  flexHist.push("💰"); sfxBank();
}
function moonWin(){
  banked+=unbanked; unbanked=0; state=ST.WIN; endT=0; ape.thrust=false;
  flash=0.7; flashCol="#dfe8ff"; burst(ape.x,ape.y,"#16e06a",50,300,1.1);
  moonRuns++; localStorage.setItem("dip_moon",moonRuns);
  if(Math.floor(banked)>best){ best=Math.floor(banked); localStorage.setItem("dip_best",best); }
  flexHist.push("🌙"); sfxWin();
}

// ===================== UPDATE =====================
function update(dt){
  for(const c of candlesFar){ c.y+=c.sp*dt; if(c.y-c.h>H){ Object.assign(c,mkCandle(-40,0.5)); c.y=-40; } }
  for(const c of candlesBg){ c.y+=c.sp*dt; if(c.y-c.h>H){ Object.assign(c,mkCandle(-40,1)); c.y=-40; } }
  for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.92; p.vy*=0.92; p.vy+=280*dt; p.life-=dt; if(p.life<=0) parts.splice(i,1); }
  for(let i=prints.length-1;i>=0;i--){ const q=prints[i]; q.h+=(q.max-q.h)*Math.min(1,dt*12); q.life-=dt; if(q.life<=0) prints.splice(i,1); }
  if(flash>0) flash=Math.max(0,flash-dt*2.2);
  if(shake>0) shake=Math.max(0,shake-dt*1.5);
  if(timeScale<1) timeScale=Math.min(1,timeScale+dt*3.2);

  if(state===ST.DEAD||state===ST.WIN){ endT+=dt; return; }
  if(state!==ST.PLAY) return;
  elapsed+=dt;

  // physics
  const th=ape.thrust?CFG.thrust:0;
  ape.vy+=(CFG.gravity-th)*dt; ape.vy=Math.max(-CFG.maxVy,Math.min(CFG.maxVy,ape.vy)); ape.y+=ape.vy*dt;
  if(keyL) ape.tx=Math.max(0,ape.tx-1250*dt);
  if(keyR) ape.tx=Math.min(W,ape.tx+1250*dt);
  ape.vx=Math.max(-CFG.maxVx,Math.min(CFG.maxVx,(ape.tx-ape.x)*CFG.stiffness)); ape.x+=ape.vx*dt;
  if(ape.x<CFG.apeR){ape.x=CFG.apeR;ape.vx=0;} if(ape.x>W-CFG.apeR){ape.x=W-CFG.apeR;ape.vx=0;}
  if(ape.y>H-CFG.apeR){ape.y=H-CFG.apeR;ape.vy=0;} if(ape.y<CFG.apeR){ape.y=CFG.apeR;ape.vy=0;}
  ape.trail.push({x:ape.x,y:ape.y}); if(ape.trail.length>11) ape.trail.shift();

  alt+=(28+zone*10)*dt; unbanked+=mult*8*dt;
  chart.push(capNow());
  zone=zoneFor(alt);
  if(zone>prevZone){ prevZone=zone; flash=0.25; flashCol="#dfe8ff"; }

  // MOON finale
  if(alt>=CFG.moonAlt && !pad){
    pad={x:W/2,y:H*0.34,r:64,pulse:0}; walls=[]; snipers=[]; rings=[];
  }
  if(pad){
    pad.pulse+=dt;
    const d=Math.hypot(ape.x-pad.x,ape.y-pad.y);
    if(d<pad.r){ moonWin(); return; }
    return; // no more hazards during landing
  }

  // spawn walls
  spawnT-=dt; if(spawnT<=0){ spawnWall(); spawnT=spawnGapS(); }
  // conviction ring
  ringCd-=dt;
  if(ringCd<=0 && rings.length===0 && combo>=2){ spawnRing(); ringCd=7+Math.random()*3; }
  // sniper (zone>=1)
  if(zone>=1){ sniperT-=dt; if(sniperT<=0){ spawnSniper(); sniperT=Math.max(2.4,4.6-zone*0.5); } }

  // walls
  const sp=speedNow(), TH=CFG.wallTH;
  for(const wl of walls){
    if(wl.tele>0){ wl.tele-=dt; continue; }
    wl.y+=sp*dt;
    if(wl.gapVx){ wl.gapX+=wl.gapVx*dt; if(wl.gapX<28){wl.gapX=28;wl.gapVx*=-1;} if(wl.gapX+wl.gapW>W-28){wl.gapX=W-28-wl.gapW;wl.gapVx*=-1;} }
    if(wl.resolved) continue;
    const withinY=ape.y+CFG.apeR>wl.y && ape.y-CFG.apeR<wl.y+TH;
    const inGap=ape.x-CFG.apeR*0.55>wl.gapX && ape.x+CFG.apeR*0.55<wl.gapX+wl.gapW;
    if(withinY && !inGap){ liquidate(); wl.resolved=true; break; }
    if(wl.y>ape.y){ if(inGap) doCatch(); wl.resolved=true; }
  }
  walls=walls.filter(w=>w.y<H+40);
  // rings
  for(const rg of rings){
    rg.y+=sp*0.8*dt; if(rg.resolved) continue;
    const d=Math.hypot(ape.x-rg.x,ape.y-rg.y);
    if(d<rg.r-6){ bankIt(); rg.resolved=true; }
    else if(rg.y>ape.y+50){ rg.resolved=true; if(unbanked>0){ diamond=true; sfxDiamond(); flash=0.2; flashCol="#5ec8ff"; } }
  }
  rings=rings.filter(r=>r.y<H+60);
  // snipers
  for(const sn of snipers){
    sn.life+=dt;
    if(!sn.fired){ sn.lock-=dt; if(sn.lock<=0){ sn.fired=true; sn.beam=0.35; noise(0.2,0.22,2200);
      if(Math.abs(ape.x-sn.x)<CFG.apeR+9) liquidate(); } }
    else sn.beam-=dt;
  }
  snipers=snipers.filter(s=>!(s.fired&&s.beam<=0));

  music(AC?AC.currentTime:0,zone,alt);
}

// ===================== RENDER =====================
function fmt(n){ return Math.floor(n).toLocaleString("en-US"); }
function rrect(x,y,w,h,r){ r=Math.min(r,w/2,h/2); ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
let grainCv=null;
function makeGrain(){ grainCv=document.createElement("canvas"); grainCv.width=256; grainCv.height=256;
  const g=grainCv.getContext("2d"), id=g.createImageData(256,256);
  for(let i=0;i<id.data.length;i+=4){ const v=Math.random()*255; id.data[i]=id.data[i+1]=id.data[i+2]=v; id.data[i+3]=255; }
  g.putImageData(id,0,0); }
function drawGrain(){ if(!grainCv) makeGrain(); ctx.globalAlpha=0.05;
  const ox=(Math.random()*256)|0, oy=(Math.random()*256)|0;
  for(let x=-ox;x<W;x+=256) for(let y=-oy;y<H;y+=256) ctx.drawImage(grainCv,x,y);
  ctx.globalAlpha=1; }
function drawVignette(){ const g=ctx.createRadialGradient(W/2,H*0.46,Math.min(W,H)*0.28,W/2,H*0.5,Math.max(W,H)*0.72);
  g.addColorStop(0,"rgba(0,0,0,0)"); g.addColorStop(1,"rgba(0,0,0,0.6)"); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
function bg(){
  const z=ZONE_BG[Math.min(zone,4)];
  const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,z[0]); g.addColorStop(1,z[1]);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const rg=ctx.createRadialGradient(W/2,H*1.06,0,W/2,H*1.06,H*0.95);
  rg.addColorStop(0,z[2]); rg.addColorStop(1,"rgba(0,0,0,0)");
  ctx.globalAlpha=0.55; ctx.fillStyle=rg; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1;
  ctx.strokeStyle="rgba(120,150,140,0.05)"; ctx.lineWidth=1; ctx.beginPath();
  for(let x=0;x<=W;x+=48){ ctx.moveTo(x,0); ctx.lineTo(x,H); }
  for(let y=0;y<=H;y+=48){ ctx.moveTo(0,y); ctx.lineTo(W,y); }
  ctx.stroke();
  if(zone>=3){ for(let i=0;i<52;i++){ const x=(i*97.3)%W, y=(i*57.7+elapsed*8)%H, s=(i%3===0)?1.8:1;
    ctx.globalAlpha=0.25+0.5*(((i*13)%7)/7); ctx.fillStyle="#fff"; ctx.fillRect(x,y,s,s); } ctx.globalAlpha=1; }
  for(const c of candlesFar) drawBgCandle(c);
  for(const c of candlesBg) drawBgCandle(c);
}
function drawBgCandle(c){
  ctx.globalAlpha=c.a; const col=c.up?"0,255,156":"255,46,80";
  ctx.strokeStyle=`rgba(${col},0.8)`; ctx.lineWidth=Math.max(1,c.w*0.16);
  ctx.beginPath(); ctx.moveTo(c.x,c.y-c.h*0.6); ctx.lineTo(c.x,c.y+c.h*0.6); ctx.stroke();
  ctx.fillStyle=`rgba(${col},0.45)`; rrect(c.x-c.w/2,c.y-c.h*0.4,c.w,c.h*0.8,2); ctx.fill();
  ctx.globalAlpha=1;
}
function drawWalls(){
  const TH=CFG.wallTH;
  for(const wl of walls){
    if(wl.tele>0){ const a=0.2+0.32*Math.sin(elapsed*30); ctx.fillStyle=`rgba(255,46,80,${a})`; ctx.fillRect(0,1,W,4); continue; }
    const rg=ctx.createLinearGradient(0,wl.y,0,wl.y+TH); rg.addColorStop(0,"#ff3a5c"); rg.addColorStop(1,"#a80f2c");
    ctx.fillStyle=rg;
    ctx.fillRect(0,wl.y,wl.gapX,TH); ctx.fillRect(wl.gapX+wl.gapW,wl.y,W-(wl.gapX+wl.gapW),TH);
    ctx.strokeStyle="rgba(80,4,18,0.55)"; ctx.lineWidth=1.5;
    for(let x=9;x<wl.gapX;x+=15){ ctx.beginPath(); ctx.moveTo(x,wl.y+3); ctx.lineTo(x,wl.y+TH-3); ctx.stroke(); }
    for(let x=wl.gapX+wl.gapW+9;x<W;x+=15){ ctx.beginPath(); ctx.moveTo(x,wl.y+3); ctx.lineTo(x,wl.y+TH-3); ctx.stroke(); }
    ctx.fillStyle="rgba(255,150,170,0.45)"; ctx.fillRect(0,wl.y,wl.gapX,1.5); ctx.fillRect(wl.gapX+wl.gapW,wl.y,W-(wl.gapX+wl.gapW),1.5);
    // green dip gate — glowing
    ctx.save(); ctx.shadowColor=COL.green; ctx.shadowBlur=22;
    ctx.strokeStyle=COL.green; ctx.lineWidth=2.5; rrect(wl.gapX+1,wl.y+1,wl.gapW-2,TH-2,5); ctx.stroke();
    ctx.restore();
    const pulse=0.55+0.45*Math.sin(elapsed*8+wl.y*0.05);
    ctx.globalAlpha=pulse; ctx.fillStyle=COL.green; ctx.fillRect(wl.gapX+4,wl.y+TH/2-2,wl.gapW-8,4); ctx.globalAlpha=1;
  }
}
function drawRings(){
  for(const rg of rings){ if(rg.resolved) continue;
    ctx.save(); ctx.translate(rg.x,rg.y); ctx.rotate(elapsed*1.1);
    ctx.strokeStyle=COL.gold; ctx.lineWidth=4; ctx.shadowColor=COL.gold; ctx.shadowBlur=16;
    ctx.setLineDash([11,9]); ctx.beginPath(); ctx.arc(0,0,rg.r,0,6.28); ctx.stroke();
    ctx.setLineDash([]); ctx.restore(); ctx.shadowBlur=0;
    ctx.fillStyle=COL.gold; ctx.font="700 10px "+MONO; ctx.textAlign="center"; ctx.fillText("TAKE PROFIT",rg.x,rg.y+3);
  }
}
function drawSnipers(){
  for(const sn of snipers){
    if(!sn.fired){ const a=0.35+0.4*Math.sin(elapsed*24);
      ctx.strokeStyle=`rgba(255,46,80,${a})`; ctx.lineWidth=2; ctx.setLineDash([6,10]);
      ctx.beginPath(); ctx.moveTo(sn.x,18); ctx.lineTo(sn.x,H); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=`rgba(255,80,105,${a})`; ctx.font="700 9px "+MONO; ctx.textAlign="center"; ctx.fillText("▼ SNIPER",sn.x,14);
    } else if(sn.beam>0){ ctx.globalAlpha=Math.min(1,sn.beam*3);
      const bg2=ctx.createLinearGradient(sn.x-9,0,sn.x+9,0);
      bg2.addColorStop(0,"rgba(255,46,80,0)"); bg2.addColorStop(0.5,"#ff6a85"); bg2.addColorStop(1,"rgba(255,46,80,0)");
      ctx.fillStyle=bg2; ctx.fillRect(sn.x-9,0,18,H); ctx.globalAlpha=1; }
  }
}
function drawPad(){
  if(!pad) return;
  const p=0.5+0.5*Math.sin(pad.pulse*4);
  ctx.strokeStyle=COL.green; ctx.lineWidth=3; ctx.shadowColor=COL.green; ctx.shadowBlur=22;
  ctx.beginPath(); ctx.arc(pad.x,pad.y,pad.r+p*8,0,6.28); ctx.stroke();
  ctx.beginPath(); ctx.arc(pad.x,pad.y,pad.r*0.5,0,6.28); ctx.stroke(); ctx.shadowBlur=0;
  ctx.fillStyle=COL.green; ctx.font="700 13px "+MONO; ctx.textAlign="center"; ctx.fillText("LAND HERE",pad.x,pad.y-pad.r-14);
  ctx.fillStyle="#dfe8ff"; ctx.font="700 26px "+DISP; ctx.fillText("🌙 THE MOON",W/2,60);
}
function drawApe(){
  for(const q of prints){ ctx.globalAlpha=Math.max(0,q.life)*1.5;
    const pg=ctx.createLinearGradient(0,q.y-q.h,0,q.y); pg.addColorStop(0,"rgba(0,255,156,0.9)"); pg.addColorStop(1,"rgba(0,255,156,0.08)");
    ctx.fillStyle=pg; rrect(q.x-9,q.y-q.h,18,q.h,4); ctx.fill(); ctx.globalAlpha=1; }
  for(let i=0;i<ape.trail.length;i++){ const t=ape.trail[i]; ctx.globalAlpha=i/ape.trail.length*(diamond?0.5:0.32);
    ctx.fillStyle=diamond?COL.blue:COL.gold; ctx.beginPath(); ctx.arc(t.x,t.y,CFG.apeR*(0.35+0.45*i/ape.trail.length),0,6.28); ctx.fill(); }
  ctx.globalAlpha=1;
  if(ape.thrust){ const fl=14+Math.random()*10;
    const fg=ctx.createLinearGradient(ape.x,ape.y+CFG.apeR,ape.x,ape.y+CFG.apeR+fl);
    fg.addColorStop(0,"#fff1a8"); fg.addColorStop(0.45,"#ff9a2e"); fg.addColorStop(1,"rgba(255,60,20,0)");
    ctx.fillStyle=fg; ctx.beginPath(); ctx.moveTo(ape.x-7,ape.y+CFG.apeR-2); ctx.lineTo(ape.x+7,ape.y+CFG.apeR-2);
    ctx.lineTo(ape.x,ape.y+CFG.apeR+fl); ctx.closePath(); ctx.fill(); }
  const r=CFG.apeR+3;
  ctx.save(); ctx.shadowColor=diamond?COL.blue:COL.gold; ctx.shadowBlur=22;
  const cg=ctx.createRadialGradient(ape.x-r*0.4,ape.y-r*0.4,1,ape.x,ape.y,r);
  cg.addColorStop(0,"#fff0b0"); cg.addColorStop(0.5,"#ffce3a"); cg.addColorStop(1,"#c98a12");
  ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(ape.x,ape.y,r,0,6.28); ctx.fill(); ctx.restore();
  ctx.strokeStyle="rgba(255,240,180,0.7)"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(ape.x,ape.y,r-1.5,0,6.28); ctx.stroke();
  ctx.fillStyle="#8a5a00"; ctx.font="800 11px "+MONO; ctx.textAlign="center"; ctx.fillText("$",ape.x,ape.y+4);
  ctx.fillStyle="#241a12"; rrect(ape.x-7,ape.y-CFG.apeR-9,14,11,3); ctx.fill();
  ctx.fillStyle="#3a2a1a"; rrect(ape.x-4,ape.y-CFG.apeR-6,8,5,2); ctx.fill();
  ctx.fillStyle="#eafff2"; ctx.fillRect(ape.x-3,ape.y-CFG.apeR-6,2.5,2.5); ctx.fillRect(ape.x+1,ape.y-CFG.apeR-6,2.5,2.5);
  if(diamond){ ctx.strokeStyle=COL.blue; ctx.globalAlpha=0.6; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(ape.x,ape.y,r+5+Math.sin(elapsed*8)*2,0,6.28); ctx.stroke(); ctx.globalAlpha=1; }
}
function drawHUD(){
  ctx.textAlign="left";
  ctx.fillStyle=COL.dim; ctx.font="600 10px "+MONO; ctx.fillText("MARKET CAP",18,20);
  ctx.fillStyle=COL.green; ctx.shadowColor=COL.green; ctx.shadowBlur=12; ctx.font="700 26px "+DISP;
  ctx.fillText("$"+fmt(capNow()),18,46); ctx.shadowBlur=0;
  ctx.textAlign="center"; ctx.fillStyle=combo>=6?COL.gold:COL.text; ctx.font="700 24px "+DISP; ctx.fillText("x"+mult.toFixed(2),W/2,32);
  if(combo>0){ ctx.fillStyle=COL.green; ctx.font="600 11px "+MONO; ctx.fillText(combo+"x COMBO",W/2,50); }
  if(diamond){ ctx.fillStyle=COL.blue; ctx.font="600 10px "+MONO; ctx.fillText("◆ DIAMOND HANDS",W/2,66); }
  ctx.textAlign="right"; ctx.fillStyle=COL.dim; ctx.font="600 10px "+MONO; ctx.fillText(ZONE_NAMES[Math.min(zone,4)],W-66,20);
  if(unbanked>0){ const a=0.6+0.4*Math.sin(elapsed*6); ctx.fillStyle=`rgba(255,110,132,${a})`; ctx.font="700 15px "+DISP;
    ctx.fillText("$"+fmt(unbanked)+" AT RISK",W-66,44); }
  // altitude rail
  const rx=W-22, ry0=82, ry1=H-46, frac=Math.min(1,alt/CFG.moonAlt);
  ctx.strokeStyle="rgba(120,140,150,0.22)"; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(rx,ry0); ctx.lineTo(rx,ry1); ctx.stroke();
  ctx.strokeStyle=COL.green; ctx.lineWidth=3; ctx.shadowColor=COL.green; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.moveTo(rx,ry1); ctx.lineTo(rx,ry1-(ry1-ry0)*frac); ctx.stroke(); ctx.shadowBlur=0;
  ctx.fillStyle=COL.dim; ctx.font="600 12px "+MONO; ctx.textAlign="center"; ctx.fillText("🌙",rx,ry0-8);
}
function drawTitle(){
  const cx=W/2, cy=H*0.36;
  ctx.textAlign="center"; ctx.font="700 clamp(72px,18vw,168px) "+DISP;
  ctx.globalAlpha=0.5; ctx.fillStyle=COL.red; ctx.fillText("DIP",cx-3+Math.sin(elapsed*3)*1.5,cy);
  ctx.fillStyle=COL.blue; ctx.fillText("DIP",cx+3-Math.sin(elapsed*3)*1.5,cy); ctx.globalAlpha=1;
  ctx.shadowColor=COL.green; ctx.shadowBlur=34; ctx.fillStyle=COL.green; ctx.fillText("DIP",cx,cy); ctx.shadowBlur=0;
  ctx.fillStyle=COL.text; ctx.font="600 clamp(15px,3.6vw,22px) "+DISP; ctx.fillText("BUY THE DIP. LITERALLY.",cx,cy+46);
  ctx.fillStyle=COL.dim; ctx.font="500 12px "+MONO; ctx.fillText("dive into the green · slingshot to the moon · $DIP",cx,cy+72);
  ctx.fillStyle=COL.gold; ctx.font="600 12px "+MONO; ctx.fillText("BEST  $"+fmt(best)+(moonRuns>0?"     🌙 x"+moonRuns:""),cx,cy+100);
  const cta=0.55+0.45*Math.sin(elapsed*4);
  ctx.fillStyle=`rgba(0,255,156,${cta})`; ctx.shadowColor=COL.green; ctx.shadowBlur=16; ctx.font="700 17px "+DISP;
  ctx.fillText("HOLD TO PUMP",cx,H*0.62); ctx.shadowBlur=0;
  ctx.fillStyle=COL.dim; ctx.font="500 10px "+MONO;
  const hint=W<640?"hold = thrust · move / ← → = steer · thread the green dip"
                  :"hold = thrust · move or ← → = steer · thread the green dip · grab 💰 rings to bank";
  ctx.fillText(hint,cx,H-22);
}
function drawCard(win){
  ctx.fillStyle="rgba(4,7,10,0.86)"; ctx.fillRect(0,0,W,H);
  const cw=Math.min(560,W-32), ch=Math.min(452,H-32), cx=(W-cw)/2, cy=(H-ch)/2;
  const accent=win?"#9fd0ff":COL.green;
  ctx.save(); ctx.shadowColor=accent; ctx.shadowBlur=26;
  ctx.fillStyle="#080b12"; rrect(cx,cy,cw,ch,16); ctx.fill(); ctx.restore();
  ctx.strokeStyle=accent; ctx.lineWidth=1.5; rrect(cx,cy,cw,ch,16); ctx.stroke();
  ctx.textAlign="left"; ctx.fillStyle=win?COL.green:COL.red; ctx.shadowColor=win?COL.green:COL.red; ctx.shadowBlur=14;
  ctx.font="700 32px "+DISP; ctx.fillText(win?"WAGMI 🌙":"LIQUIDATED",cx+24,cy+46); ctx.shadowBlur=0;
  ctx.textAlign="right"; ctx.fillStyle=COL.green; ctx.font="700 15px "+DISP; ctx.fillText("$DIP",cx+cw-24,cy+34);
  const gx=cx+24,gy=cy+62,gw=cw-48,gh=138;
  ctx.strokeStyle="rgba(127,143,160,0.25)"; ctx.lineWidth=1; ctx.strokeRect(gx,gy,gw,gh);
  if(chart.length>1){ const mx=Math.max(...chart,1); let prev=0; const stepd=Math.max(1,(chart.length/72)|0);
    for(let k=0;k<chart.length;k+=stepd){ const v=chart[k],x=gx+(k/chart.length)*gw,y=gy+gh-(v/mx)*gh,up=v>=prev;
      ctx.strokeStyle=up?COL.green:COL.red; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(x,gy+gh); ctx.lineTo(x,y); ctx.stroke(); prev=v; } }
  ctx.textAlign="left"; ctx.fillStyle=COL.text; ctx.font="700 22px "+DISP; ctx.fillText((win?"SECURED":"FINAL")+"  $"+fmt(banked),cx+24,cy+ch-94);
  if(!win && forfeited>0){ ctx.fillStyle="#ff6a85"; ctx.font="500 12px "+MONO; ctx.fillText("forfeited $"+fmt(forfeited)+" unbanked — bank a 💰 ring next time",cx+24,cy+ch-74); }
  ctx.fillStyle=COL.dim; ctx.font="500 12px "+MONO; ctx.fillText("BEST COMBO  "+bestCombo+"x      RANK  "+rankFor(banked),cx+24,cy+ch-52);
  ctx.fillStyle=(banked>=best&&banked>0)?COL.gold:COL.dim; ctx.font="600 12px "+MONO;
  ctx.fillText(banked>=best&&banked>0?"★ NEW ALL-TIME BEST":"BEST  $"+fmt(best),cx+24,cy+ch-34);
  ctx.textAlign="center"; ctx.fillStyle=`rgba(234,255,242,${0.55+0.45*Math.sin(elapsed*4)})`; ctx.font="700 13px "+DISP;
  ctx.fillText(endT>0.4?"CLICK / TAP TO RUN IT BACK":"...",W/2,cy+ch+24);
  ctx.fillStyle=COL.dim; ctx.font="500 10px "+MONO; ctx.fillText("S = save PNG   ·   C = copy flex",W/2,cy+ch+42);
}

function render(){
  ctx.clearRect(0,0,W,H);
  ctx.save();
  if(shake>0){ const s=shake*shake*16; ctx.translate((Math.random()-0.5)*s,(Math.random()-0.5)*s); }
  bg();
  if(state===ST.PLAY||state===ST.DEAD||state===ST.WIN){ drawWalls(); drawRings(); drawSnipers(); drawPad(); }
  for(const p of parts){ ctx.globalAlpha=Math.max(0,p.life/p.max); ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill(); }
  ctx.globalAlpha=1;
  if(state===ST.PLAY||state===ST.DEAD||state===ST.WIN) drawApe();
  ctx.restore();
  drawGrain(); drawVignette();
  if(flash>0){ const fx=(state===ST.PLAY?ape.x:W/2), fy=(state===ST.PLAY?ape.y:H/2);
    const fg=ctx.createRadialGradient(fx,fy,0,W/2,H/2,Math.max(W,H)*0.72);
    fg.addColorStop(0,flashCol); fg.addColorStop(1,"rgba(0,0,0,0)");
    ctx.globalAlpha=flash*0.55; ctx.fillStyle=fg; ctx.fillRect(0,0,W,H); ctx.globalAlpha=1; }
  if(state===ST.TITLE) drawTitle();
  else if(state===ST.PLAY) drawHUD();
  else drawCard(state===ST.WIN);
}

// ===================== SHARE =====================
function flexString(){
  const tail=flexHist.slice(-26).join("");
  return `DIP  cap $${fmt(banked)}  combo x${bestCombo}  ${rankFor(banked)}\n${tail}\nbuy the dip. literally.  $DIP  orynth.dev`;
}
function copyFlex(){
  const s=flexString();
  if(navigator.clipboard) navigator.clipboard.writeText(s).catch(()=>{});
  else { const t=document.createElement("textarea"); t.value=s; document.body.appendChild(t); t.select(); try{document.execCommand("copy");}catch(e){} t.remove(); }
  flash=0.2; flashCol="#16e06a";
}
function savePNG(){
  const sc=document.createElement("canvas"); sc.width=600; sc.height=460; const g=sc.getContext("2d");
  g.fillStyle="#0d0a16"; g.fillRect(0,0,600,460);
  g.strokeStyle=state===ST.WIN?"#dfe8ff":"#16e06a"; g.lineWidth=3; g.strokeRect(6,6,588,448);
  g.textAlign="left"; g.fillStyle=state===ST.WIN?"#16e06a":"#ff2e4d"; g.font="900 34px ui-monospace,monospace";
  g.fillText(state===ST.WIN?"WAGMI 🌙":"LIQUIDATED",26,54);
  g.textAlign="right"; g.fillStyle="#16e06a"; g.font="bold 18px ui-monospace,monospace"; g.fillText("$DIP",574,44);
  const gx=26,gy=76,gw=548,gh=180; g.strokeStyle="rgba(127,143,160,0.3)"; g.strokeRect(gx,gy,gw,gh);
  if(chart.length>1){ const mx=Math.max(...chart,1); let prev=0; const stepd=Math.max(1,(chart.length/80)|0);
    for(let k=0;k<chart.length;k+=stepd){ const v=chart[k],x=gx+(k/chart.length)*gw,y=gy+gh-(v/mx)*gh,up=v>=prev;
      g.strokeStyle=up?"#16e06a":"#ff2e4d"; g.lineWidth=2; g.beginPath(); g.moveTo(x,gy+gh); g.lineTo(x,y); g.stroke(); prev=v; } }
  g.textAlign="left"; g.fillStyle="#eafff2"; g.font="bold 26px ui-monospace,monospace"; g.fillText("MARKET CAP  $"+fmt(banked),26,310);
  g.fillStyle="#7f8fa0"; g.font="15px ui-monospace,monospace"; g.fillText("COMBO x"+bestCombo+"     RANK  "+rankFor(banked),26,342);
  g.fillStyle="#dfe8ff"; g.font="bold 18px ui-monospace,monospace"; g.fillText("Buy the dip. Literally.",26,388);
  g.fillStyle="#7f8fa0"; g.font="13px ui-monospace,monospace"; g.fillText("play $DIP on orynth.dev",26,414);
  try{ const a=document.createElement("a"); a.href=sc.toDataURL("image/png"); a.download="dip-run.png"; a.click(); flash=0.2; flashCol="#16e06a"; }catch(e){}
}

// ===================== LOOP =====================
let last=performance.now(), acc=0; const STEP=1/60;
function frame(now){
  let dt=(now-last)/1000; last=now; dt=Math.min(dt,0.05);
  if(hitstop>0){ hitstop-=dt; } else { acc+=dt*timeScale; let guard=0; while(acc>=STEP && guard++<5){ update(STEP); acc-=STEP; } }
  render(); requestAnimationFrame(frame);
}
seedBg(); requestAnimationFrame(frame);
})();
</script>
